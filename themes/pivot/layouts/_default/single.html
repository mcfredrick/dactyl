{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ .Date.Format "Monday, January 2, 2006" }}</h1>
    <div class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
      {{ with .Params.job_count }}<span class="job-count">{{ . }} jobs</span>{{ end }}
    </div>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
