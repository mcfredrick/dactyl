name: Daily Pivot Digest

on:
  schedule:
    - cron: '0 9 * * 1-5'  # 09:00 UTC weekdays only
  workflow_dispatch:
    inputs:
      skip_research:
        description: 'Prefer cached research.json from last run (falls back to fresh if unavailable)'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  generate-post:
    outputs:
      post_committed: ${{ steps.commit.outputs.committed }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-caching: true
          python-version: '3.12'

      - name: Install dependencies
        run: |
          uv sync
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH

      - name: Guard — skip if today's post already exists
        run: |
          POST="content/posts/$(date -u +%Y-%m-%d).md"
          if [ -f "$POST" ]; then
            echo "Post $POST already exists, skipping agents."
            echo "SKIP_AGENTS=true" >> "$GITHUB_ENV"
          fi

      - name: Select models
        if: env.SKIP_AGENTS != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python agents/model_selector.py

      - name: Research — restore cache or run fresh
        if: env.SKIP_AGENTS != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
        run: |
          USED_CACHE=false

          if [ "${{ inputs.skip_research }}" = "true" ]; then
            run_id=$(gh run list --workflow=daily.yml --status=success --limit=5 \
              --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
            if [ -n "$run_id" ] && gh run download "$run_id" --name research-json --dir /tmp 2>/dev/null; then
              echo "Restored research.json from run $run_id"
              USED_CACHE=true
            else
              echo "No cached artifact found — running research agent instead"
            fi
          fi

          if [ "$USED_CACHE" = "false" ]; then
            python agents/research_agent.py
            echo "RAN_RESEARCH=true" >> "$GITHUB_ENV"
          fi

      - name: Upload research.json as artifact
        if: env.SKIP_AGENTS != 'true' && env.RAN_RESEARCH == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: research-json
          path: /tmp/research.json
          retention-days: 7

      - name: Cooldown between agents
        if: env.SKIP_AGENTS != 'true' && env.RAN_RESEARCH == 'true'
        run: sleep 60

      - name: Run writing agent and validate (with retry)
        if: env.SKIP_AGENTS != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          POST="content/posts/$(date -u +%Y-%m-%d).md"
          for attempt in 1 2 3; do
            echo "=== Writing attempt $attempt ==="
            python agents/writing_agent.py
            if python agents/validate_post.py "$POST"; then
              echo "Validation passed on attempt $attempt"
              exit 0
            fi
            echo "Validation failed, retrying writing agent in 30s..."
            sleep 30
          done
          echo "All writing attempts failed validation"
          exit 1

      - name: Commit post and seen.json
        id: commit
        if: env.SKIP_AGENTS != 'true'
        run: |
          git config user.name "pivot-bot"
          git config user.email "pivot-bot@users.noreply.github.com"
          POST="content/posts/$(date -u +%Y-%m-%d).md"
          git add "$POST" agents/seen.json
          git commit -m "post: $(date -u +%Y-%m-%d) job digest [skip ci]"
          git pull --rebase
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily digest failed — ${new Date().toISOString().slice(0,10)}`,
              body: `The daily post workflow failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bot-failure'],
            })

  publish:
    needs: generate-post
    if: always() && needs.generate-post.outputs.post_committed == 'true'
    uses: ./.github/workflows/publish.yml
    secrets: inherit
